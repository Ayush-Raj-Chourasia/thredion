name: Deploy Staging to Azure

on:
  push:
    branches:
      - staging

jobs:
  deploy-to-azure:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Staging App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'thredion-api-staging'
          slot-name: 'production'
          package: ./thredion-engine
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_STAGING }}

      - name: Run Staging Tests
        run: |
          cd thredion-engine
          python -m pip install -r requirements.txt
          python -c "import httpx; r = httpx.get('https://thredion-api-staging.azurewebsites.net/health', timeout=10); print(f'Staging Health: {r.status_code}')" || echo "Staging still starting..."
