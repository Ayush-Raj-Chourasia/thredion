<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="thread" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Brain/thread "T" mark -->
  <text x="256" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="320" fill="url(#thread)">T</text>
  <!-- Connection dots -->
  <circle cx="140" cy="130" r="24" fill="#a5b4fc" opacity="0.8"/>
  <circle cx="372" cy="130" r="24" fill="#a5b4fc" opacity="0.8"/>
  <circle cx="140" cy="400" r="18" fill="#c4b5fd" opacity="0.6"/>
  <circle cx="372" cy="400" r="18" fill="#c4b5fd" opacity="0.6"/>
  <!-- Connection lines -->
  <line x1="140" y1="130" x2="256" y2="200" stroke="#c7d2fe" stroke-width="6" opacity="0.4"/>
  <line x1="372" y1="130" x2="256" y2="200" stroke="#c7d2fe" stroke-width="6" opacity="0.4"/>
  <line x1="140" y1="400" x2="200" y2="340" stroke="#c7d2fe" stroke-width="4" opacity="0.3"/>
  <line x1="372" y1="400" x2="312" y2="340" stroke="#c7d2fe" stroke-width="4" opacity="0.3"/>
</svg>
