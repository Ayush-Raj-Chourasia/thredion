# Render Deployment Configuration for Thredion Engine
# Learn more: https://render.com/docs/deploy-from-git

services:
  - type: web
    name: thredion-api
    env: docker
    plan: free  # Free tier (will spin down after 15 mins of inactivity)
    
    # Builder settings
    dockerfilePath: ./thredion-engine/Dockerfile
    dockerContext: ./thredion-engine
    
    # Port configuration (must match exposed port in Dockerfile)
    port: 8000
    
    # Auto-deploy from Git
    autoDeploy: true
    
    # Health check endpoint
    healthCheckPath: /health
    
    # Environment variables (set via Render dashboard)
    # You still need to add these manually in Render dashboard:
    # - SUPABASE_URL
    # - SUPABASE_KEY
    # - OPENAI_API_KEY
    # - TWILIO_ACCOUNT_SID
    # - TWILIO_AUTH_TOKEN
    # - TWILIO_WHATSAPP_NUMBER
    # - FRONTEND_URL
    # - JWT_SECRET
    
    # Timeouts
    maxShutdownDelay: 30  # 30 second shutdown grace period
    
    # Scaling (Free tier supports 1 instance only)
    numInstances: 1
